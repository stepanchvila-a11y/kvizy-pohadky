<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
}

.spravne {
    background-color: #c8f7c5;
    font-weight: bold;
}

.spatne {
    background-color: #ffc7c7;
}

.answer {
    padding: 5px;
}

.answer label {
    display: block;
    padding: 6px;
    cursor: pointer;
    border-radius: 6px;
}

.answer label:hover {
    background: #f0f0f0;
}
</style>
<script>
function vyhodnotitKviz() {

    let spravne = [
        "2",
        "6",
        "7",
        "11",
        "13",
        "18",
        "20",
        "23",
        "25",
        "30"
    ];

    let body = 0;

    for (let i = 1; i <= 10; i++) {

        let odpoved = document.querySelector('input[name="' + i + '"]:checked');

        let vsechny = document.querySelectorAll('input[name="' + i + '"]');

        vsechny.forEach(input => {

            let label = input.parentElement.nextElementSibling;

            // odstranění puntíku
            input.style.display = "none";

            // správná odpověď
            if (input.value === spravne[i-1]) {
                label.classList.add("spravne");
            }

            // špatně vybraná odpověď
            if (odpoved && input.checked && input.value !== spravne[i-1]) {
                label.classList.add("spatne");
            }

            // zablokování změny
            input.disabled = true;
        });


        if (odpoved && odpoved.value === spravne[i-1]) {
            body++;
        }
    }


    let procenta = Math.round((body / spravne.length) * 100);


    document.getElementById("vysledek").innerHTML =
        "Výsledek: <strong>" + body + " / " + spravne.length +
        " bodů</strong><br>" +
        "Úspěšnost: <strong>" + procenta + " %</strong>";


    // změna tlačítka
    let tlacitko = document.getElementById("tlacitko");
    tlacitko.value = "Zkusit znovu";
    tlacitko.onclick = function() {
        location.reload();
    };

window.scrollTo({
    top: 0,
    behavior: "smooth"
});
}
</script>
